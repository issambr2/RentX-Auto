# fly.toml app configuration file generated for rentx-auto

app = "rentx-auto"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    method = "get"
    path = "/api/health"
